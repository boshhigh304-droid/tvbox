name: Auto sync qist upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-sync-qist-upstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync master from qist/tvbox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream
        shell: bash
        run: |
          set -euo pipefail

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          UPSTREAM_REPO="qist/tvbox"
          UPSTREAM_BRANCH="master"

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "$UPSTREAM_BRANCH" --prune

          git checkout "$DEFAULT_BRANCH"
          git pull --ff-only origin "$DEFAULT_BRANCH"

          if git merge-base --is-ancestor "upstream/$UPSTREAM_BRANCH" HEAD; then
            echo "Already up to date with upstream/$UPSTREAM_BRANCH."
            exit 0
          fi

          git merge --no-edit "upstream/$UPSTREAM_BRANCH"
          git push origin "HEAD:$DEFAULT_BRANCH"
